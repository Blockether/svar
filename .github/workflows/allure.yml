name: Allure Report

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: allure-report
  cancel-in-progress: false

env:
  PAGES_BASE_URL: https://blockether.github.io/svar
  MAX_REPORTS: 15

jobs:
  report:
    runs-on: ubuntu-latest
    if: >-
      (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')
      && github.event.workflow_run.head_repository.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Download Allure results from CI
        id: download-results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty results dir if download failed
        if: steps.download-results.outcome == 'failure'
        run: mkdir -p allure-results

      - name: Detect context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_EVENT="${{ github.event.workflow_run.event }}"
          echo "ci_event=$CI_EVENT" >> $GITHUB_OUTPUT
          echo "is_pr=false" >> $GITHUB_OUTPUT
          echo "is_main=$( [ "$CI_EVENT" = "push" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "ci_run_number=${{ github.event.workflow_run.run_number }}" >> $GITHUB_OUTPUT
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "ci_passed=${{ github.event.workflow_run.conclusion == 'success' }}" >> $GITHUB_OUTPUT

          if [ "$CI_EVENT" = "pull_request" ]; then
            PR_JSON='${{ toJSON(github.event.workflow_run.pull_requests) }}'
            PR_NUM=$(echo "$PR_JSON" | jq '.[0].number // empty')

            if [ -z "$PR_NUM" ]; then
              HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
              if [ -n "$HEAD_BRANCH" ]; then
                PR_NUM=$(gh pr list --head "$HEAD_BRANCH" --state all --json number --jq '.[0].number' 2>/dev/null || true)
              fi
            fi

            if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "null" ]; then
              echo "is_pr=true" >> $GITHUB_OUTPUT
              echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Compile Java sources
        run: clojure -T:build compile-java

      - name: Restore Allure history
        if: steps.ctx.outputs.is_main == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .allure-history.jsonl
          key: allure-history-jsonl-${{ steps.ctx.outputs.ci_run_number }}
          restore-keys: allure-history-jsonl-

      - name: Generate Allure report
        run: |
          clojure -M:test -e "
            (require '[com.blockether.svar.allure-reporter :as r])
            (r/generate-html-report! \"allure-results\" \"allure-report\")"

      - name: Extract test counts
        id: test-counts
        run: |
          PASSED=$(grep -l '"status": *"passed"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          FAILED=$(grep -l '"status": *"failed"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          BROKEN=$(grep -l '"status": *"broken"' allure-results/*-result.json 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((PASSED + FAILED + BROKEN))
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "broken=$BROKEN" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # === PR Report ===
      - name: Comment PR with report link
        if: steps.ctx.outputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = ${{ steps.ctx.outputs.pr_number }};
            const reportUrl = `https://blockether.github.io/svar/pr/${prNum}/`;
            const body = `## Allure Report\n\n[View Report](${reportUrl})\n\nTests: ${{ steps.test-counts.outputs.passed }} passed, ${{ steps.test-counts.outputs.failed }} failed`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum,
            });
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('Allure Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNum, body });
            }

      - name: Deploy PR report
        if: steps.ctx.outputs.is_pr == 'true'
        env:
          PR_NUM: ${{ steps.ctx.outputs.pr_number }}
        run: |
          git fetch origin gh-pages --depth=1 || true
          git worktree add /tmp/gh-pages origin/gh-pages 2>/dev/null || { mkdir -p /tmp/gh-pages && cd /tmp/gh-pages && git init && git checkout --orphan gh-pages && touch .nojekyll && git add .nojekyll && git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "init gh-pages" && cd "${{ github.workspace }}"; }
          rm -rf "/tmp/gh-pages/pr/${PR_NUM}"
          mkdir -p "/tmp/gh-pages/pr/${PR_NUM}"
          cp -r allure-report/* "/tmp/gh-pages/pr/${PR_NUM}/"
          cd /tmp/gh-pages
          git add -A
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "deploy: PR #${PR_NUM} allure report" --allow-empty
          git push origin gh-pages
          cd "${{ github.workspace }}"
          git worktree remove /tmp/gh-pages --force 2>/dev/null || true

      # === Main Report ===
      - name: Deploy main report
        if: steps.ctx.outputs.is_main == 'true'
        env:
          RUN_NUMBER: ${{ steps.ctx.outputs.ci_run_number }}
        run: |
          mkdir -p gh-pages-site

          # Fetch existing site
          git fetch origin gh-pages --depth=1 || true
          if git show origin/gh-pages:.nojekyll >/dev/null 2>&1; then
            git worktree add /tmp/gh-pages-checkout origin/gh-pages 2>/dev/null || true
            if [ -d /tmp/gh-pages-checkout ]; then
              for item in /tmp/gh-pages-checkout/*/; do
                dirname=$(basename "$item")
                if [[ "$dirname" =~ ^[0-9]+$ ]] || [ "$dirname" = "pr" ] || [ "$dirname" = "latest" ]; then
                  cp -r "$item" "gh-pages-site/$dirname"
                fi
              done
              for f in badge.svg .nojekyll pr-builds.json; do
                [ -f "/tmp/gh-pages-checkout/$f" ] && cp "/tmp/gh-pages-checkout/$f" "gh-pages-site/$f"
              done
              git worktree remove /tmp/gh-pages-checkout --force 2>/dev/null || true
            fi
          fi

          # Add new report
          cp -r allure-report "gh-pages-site/${RUN_NUMBER}"
          touch gh-pages-site/.nojekyll

          # Prune old reports
          cd gh-pages-site
          DIRS=$(ls -1d [0-9]* 2>/dev/null | sort -n)
          COUNT=$(echo "$DIRS" | grep -c . || true)
          if [ "$COUNT" -gt "${{ env.MAX_REPORTS }}" ]; then
            REMOVE=$((COUNT - ${{ env.MAX_REPORTS }}))
            echo "$DIRS" | head -n "$REMOVE" | while read -r dir; do
              echo "Pruning old report: $dir"
              rm -rf "$dir"
            done
          fi

          # Create latest redirect
          mkdir -p latest
          cat > latest/index.html <<HTMLEOF
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=../${RUN_NUMBER}/"></head><body></body></html>
          HTMLEOF

          # Copy badge
          if [ -f "${RUN_NUMBER}/badge.svg" ]; then
            cp "${RUN_NUMBER}/badge.svg" badge.svg
          fi
          cd ..

      - name: Cache Allure history
        if: steps.ctx.outputs.is_main == 'true'
        uses: actions/cache/save@v4
        with:
          path: .allure-history.jsonl
          key: allure-history-jsonl-${{ steps.ctx.outputs.ci_run_number }}

      - name: Publish to GitHub Pages
        if: steps.ctx.outputs.is_main == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-site
          keep_files: false
